synopsys.English=A thick fog has settled in around Winthrope Manor. No one has seen Lord Winthrope in weeks.
synopsys.French=Une brume épaisse s'est installée autour du Manoir Winthrope. Personne n'a vu Lord Winthrope depuis des semaines.
synopsys.Spanish=Una densa niebla se ha asentado alrededor de la Mansión Winthrope. Nadie ha visto al señor Winthrope en semanas.
description.English=This is my first attempt at creating a scenario for the game Mansions of Madness 2nd edition, suitable for 2 to 5 players. Difficulty will be challenging if using just 2 players.\n\nThe scenario requires possession of the following add-on to work: "Streets of Arkham",  but also uses one monster from the 1st edition "Conversion Kit", if players don't have this add-on simply select "MoM First Edition Monsters" from the Conversion Kit menu and substitute any suitable miniature you may have in your collection.
description.French=Voici ma première tentative de création d'un scénario pour le jeu Les Demeures de l'Épouvante 2e édition, conçu pour 2 à 5 joueurs. La difficulté sera soutenue à 2 joueurs.\n\nCe scénario nécessite l'extension « Les Rues d'Arkham » et utilise un monstre du « Les Demeures de l'Épouvante, produits de la 1re édition ». Si vous ne possédez pas cette extension, sélectionnez simplement « Les Demeures de l'Épouvante, 1re édition, Monstres » dans le menu du produits de la 1re édition et remplacez le monstre par une figurine adaptée de votre collection.
description.Spanish=Este es mi primer escenario para el juego "Mansiones de la locura", 2.ª edición. Se recomiendan de 2 a 5 jugadores. Con sólo 2 investigadores, la dificultad del escenario será bastante alta.\n\nEl escenario requiere la expansión "Calles de Arkham" para funcionar, además de un monstruo del "Kit de conversión" de la 1.ª edición. Si no tienes esta expansión, simplemente selecciona en el menú de "Mi colección", a continuación "Kit de conversión" y la opción de "Monstruos de las Mansiones de la locura, primera edición", sustituyendo la miniatura del monstruo por cualquier otra que tengas en tu colección.
