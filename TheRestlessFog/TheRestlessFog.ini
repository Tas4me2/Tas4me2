synopsys.English=A thick fog has settled in around Winthrope Manor. No one has seen Lord Winthrope in weeks.
synopsys.French=Une brume épaisse s'est installée autour du Manoir Winthrope. Personne n'a vu Lord Winthrope depuis des semaines.
synopsys.Spanish=Una densa niebla se ha asentado alrededor de la Mansión Winthrope. Nadie ha visto al señor Winthrope en semanas.
description.English=This is my first attempt at creating a scenario for the game Mansions of Madness 2nd edition, suitable for 2 to 5 players. Difficulty will be challenging if using just 2 players.\n\nThe scenario requires possession of the following add-on to work: "Streets of Arkham",  but also uses one monster from the 1st edition "Conversion Kit", if players don't have this add-on simply select "MoM First Edition Monsters" from the Conversion Kit menu and subtitute any suitable miniature you may have in your collection.
description.French=Voici ma première tentative de création d'un scénario pour le jeu Mansions of Madness 2e édition, conçu pour 2 à 5 joueurs. La difficulté sera soutenue à 2 joueurs.\n\nCe scénario nécessite l'extension « Streets of Arkham » et utilise un monstre du « Conversion Kit » de la 1re édition. Si vous ne possédez pas cette extension, sélectionnez simplement « MoM First Edition Monsters » dans le menu du Conversion Kit et remplacez le monstre par une figurine adaptée de votre collection.
description.Spanish=Este es mi primer intento de crear un escenario para el juego Mansions of Madness, 2.ª edición, apto para 2 a 5 jugadores. La dificultad será considerable si solo juegan 2 personas.\n\nEl escenario requiere la expansión "Streets of Arkham" para funcionar, pero también utiliza un monstruo del "Kit de conversión" de la 1.ª edición. Si los jugadores no tienen esta expansión, simplemente seleccionen "Monstruos de la primera edición de Mansions of Madness" en el menú del Kit de conversión y sustituyan la miniatura por cualquier otra que tengan en su colección.
